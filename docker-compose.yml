# TENIR-Gov — docker-compose.yml
# SoftwareX reproducibility protocol — R5.0.0 (IRON OMEGA R5)
#
# Quickstart:
#   docker compose up -d --build
#   docker compose exec tenir-middleware pytest -v --cov=tenir_governance
#
# With Neo4j graph features enabled:
#   docker compose --profile graph up -d --build

services:

  tenir-middleware:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenir-middleware
    ports:
      - "8000:8000"
    environment:
      - TENIR_POLICY=default
      - TENIR_MODE=SHADOW_PASSIVE
      - TENIR_LEDGER_PATH=/app/ledger/tenir_ledger.jsonl
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tenir-sovereign
    volumes:
      # Ledger persists across restarts (ReadWriteOnce equivalent in Docker)
      - tenir-ledger:/app/ledger
      - tenir-audit:/app/audit
    depends_on:
      neo4j:
        condition: service_healthy
        required: false   # middleware starts and degrades gracefully without Neo4j
    command: >
      uvicorn r5_hardened.IRON_OMEGA_R5.r5_server:app
        --host 0.0.0.0
        --port 8000
        --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  neo4j:
    image: neo4j:5-community
    container_name: tenir-neo4j
    profiles: ["graph"]          # opt-in: docker compose --profile graph up
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/tenir-sovereign
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "tenir-sovereign", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  tenir-ledger:
    driver: local
  tenir-audit:
    driver: local
  neo4j-data:
    driver: local
